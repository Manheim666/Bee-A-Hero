server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown routes fall back to index.html (react-router handles them client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache built assets aggressively (hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
