# Render.com blueprint for the Bee-A-Hero FastAPI backend (the frontend deploys to GitHub Pages).
# One-time: on render.com "New > Blueprint", point it at this repo/branch. Render builds the
# backend Dockerfile and hosts it; copy the service URL into the GitHub repo variable VITE_API_URL
# so the Pages frontend talks to it.
#
# Note: the default SQLite DB lives on the container's ephemeral disk and resets on redeploy —
# add a Render Postgres and set DATABASE_URL for anything persistent.
services:
  - type: web
    name: bee-a-hero-backend
    runtime: docker
    rootDir: bee-a-hero-app/backend
    dockerfilePath: ./Dockerfile
    # Render injects $PORT; the Dockerfile CMD hardcodes 8000, so override to bind $PORT.
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: ANTHROPIC_API_KEY          # set in the Render dashboard (kept out of git)
        sync: false
      - key: SECRET_KEY                 # JWT signing key — generated once by Render
        generateValue: true
      - key: FRONTEND_ORIGIN            # the GitHub Pages origin, for CORS
        value: https://manheim666.github.io
      # DATABASE_URL: add a Render Postgres and set this for persistence (default is ephemeral SQLite)
